<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="sheetShadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#16231f" flood-opacity="0.07"/></filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#16231f" flood-opacity="0.08"/></filter>
    <style>
      .ui { font-family: "Avenir Next", "Manrope", "Helvetica Neue", sans-serif; fill: #182320; }
      .prose { font-family: "Iowan Old Style", "Literata", Georgia, serif; fill: #182320; }
      .mono { font-family: "SFMono-Regular", "IBM Plex Mono", Menlo, monospace; fill: #52605b; }
      .muted { fill: #697671; }
      .inverse { fill: #FCFDFC; }
      .inverse-muted { fill: #AFC0BA; }
      .hair { stroke: #D5DEDA; stroke-width: 1; }
      .label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }
      .small { font-size: 12px; }
      .body { font-size: 14px; }
      .nav { font-size: 14px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#F3F6F5"/>
  <rect x="0" y="0" width="220" height="1000" fill="#FCFDFC"/>
  <line x1="220" y1="0" x2="220" y2="1000" class="hair"/>

  <g transform="translate(30 30)"><path d="M0 2 H26 M4 10 H22 M8 18 H18" stroke="#1C665A" stroke-width="2.4" stroke-linecap="round"/><text x="39" y="18" class="ui" font-size="17" font-weight="750" letter-spacing="2.2">CERNO</text></g>
  <text x="31" y="81" class="mono small">PERSONAL INTELLIGENCE</text>

  <g class="ui">
    <circle cx="38" cy="142" r="5" fill="#91A09B"/><text x="57" y="147" class="nav muted">Briefings</text>
    <rect x="16" y="172" width="188" height="42" rx="9" fill="#DCEBE7"/>
    <path d="M33 193 h11 M38.5 187.5 v11" stroke="#1C665A" stroke-width="1.8" stroke-linecap="round"/><text x="57" y="198" class="nav">Focus threads</text>
    <path d="M33 238 h12 v14 h-12 z M36 242 h6 M36 246 h6" fill="none" stroke="#75827d" stroke-width="1.5"/><text x="57" y="249" class="nav muted">TasteDoc</text>
    <path d="M33 289 h13 M33 295 h9 M33 301 h11" stroke="#75827d" stroke-width="1.6" stroke-linecap="round"/><text x="57" y="300" class="nav muted">Research runs</text>
    <path d="M33 340 l5 -5 5 5 5 -8" fill="none" stroke="#75827d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><text x="57" y="346" class="nav muted">Evaluations</text>
  </g>

  <g transform="translate(17 405)">
    <text x="13" y="0" class="ui label muted">YOUR THREADS</text>
    <rect x="0" y="20" width="187" height="82" rx="11" fill="#F3F6F5" stroke="#D5DEDA"/>
    <circle cx="18" cy="43" r="5" fill="#1C665A"/><text x="31" y="47" class="ui" font-size="12" font-weight="700">Agent memory</text>
    <text x="16" y="70" class="ui" font-size="11" fill="#697671">Active · briefing ready</text>
    <text x="16" y="90" class="mono" font-size="9">THREAD 07</text>
    <circle cx="18" cy="132" r="5" fill="#91A09B"/><text x="31" y="136" class="ui" font-size="12" font-weight="650">Video reasoning</text>
    <text x="16" y="159" class="ui" font-size="11" fill="#697671">Paused</text>
    <circle cx="18" cy="197" r="5" fill="#91A09B"/><text x="31" y="201" class="ui" font-size="12" font-weight="650">Founder distribution</text>
    <text x="16" y="224" class="ui" font-size="11" fill="#697671">Paused</text>
  </g>

  <g transform="translate(17 893)">
    <rect width="187" height="78" rx="12" fill="#182320"/>
    <circle cx="18" cy="23" r="4" fill="#7FC2B3"/>
    <text x="31" y="27" class="ui inverse" font-size="12" font-weight="700">TasteDoc v3 active</text>
    <text x="15" y="51" class="mono inverse-muted" font-size="10">8 trusted sources</text>
    <text x="15" y="67" class="mono inverse-muted" font-size="10">42 indexed claims</text>
  </g>

  <!-- Top bar -->
  <text x="254" y="37" class="ui" font-size="12" font-weight="700" fill="#1C665A">FOCUS THREADS</text>
  <text x="254" y="60" class="ui" font-size="15" font-weight="650">Define what deserves attention now</text>
  <rect x="1437" y="22" width="131" height="42" rx="10" fill="#FCFDFC" stroke="#D5DEDA"/>
  <text x="1502" y="48" text-anchor="middle" class="ui" font-size="12" font-weight="700">View all threads</text>
  <line x1="220" y1="84" x2="1600" y2="84" class="hair"/>

  <!-- Main form -->
  <g filter="url(#sheetShadow)"><rect x="248" y="106" width="884" height="866" rx="15" fill="#FCFDFC"/></g>
  <text x="282" y="145" class="mono label" fill="#1C665A">NEW FOCUS THREAD</text>
  <text x="282" y="185" class="ui" font-size="30" font-weight="700" letter-spacing="-0.7">Start with a decision, not a topic</text>
  <text x="282" y="216" class="prose" font-size="15" fill="#65726d">Tell Cerno what you are trying to understand and what useful would look like.</text>
  <line x1="282" y1="244" x2="1098" y2="244" class="hair"/>

  <!-- Question -->
  <text x="282" y="281" class="ui label muted">WHAT ARE YOU TRYING TO UNDERSTAND OR DECIDE?</text>
  <rect x="282" y="297" width="816" height="126" rx="12" fill="#F7F9F8" stroke="#9EBAB3" stroke-width="1.3"/>
  <text x="306" y="330" class="prose" font-size="18" font-weight="600">
    <tspan x="306" dy="0">How are teams using long-term agent memory in production,</tspan>
    <tspan x="306" dy="28">and what evaluation patterns are actually holding up?</tspan>
  </text>
  <text x="306" y="400" class="mono" font-size="9">149 / 500</text>
  <circle cx="1068" cy="397" r="12" fill="#DCEBE7"/>
  <path d="M1064 392 v8 a4 4 0 0 0 8 0 v-8 M1061 399 a7 7 0 0 0 14 0 M1068 406 v5" fill="none" stroke="#1C665A" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Known context -->
  <text x="282" y="462" class="ui label muted">WHAT DO YOU ALREADY KNOW?</text>
  <text x="1071" y="462" text-anchor="end" class="ui small muted">Optional, but improves novelty</text>
  <rect x="282" y="478" width="816" height="82" rx="11" fill="#FCFDFC" stroke="#D5DEDA"/>
  <text x="306" y="508" class="ui body" fill="#43514C">I know the basic episodic / semantic split and common vector-store patterns.</text>
  <text x="306" y="534" class="ui body" fill="#43514C">Skip primers; focus on architecture, failure modes, and benchmarks.</text>

  <!-- Success criteria -->
  <text x="282" y="599" class="ui label muted">WHAT WOULD MAKE THIS BRIEFING USEFUL?</text>
  <g transform="translate(282 615)">
    <rect width="254" height="39" rx="9" fill="#DCEBE7" stroke="#AFCFC7"/>
    <circle cx="20" cy="19" r="7" fill="#1C665A"/><path d="M16 19 l3 3 5 -6" fill="none" stroke="#FCFDFC" stroke-width="1.4"/>
    <text x="35" y="24" class="ui" font-size="12" font-weight="650">Patterns I can implement</text>
    <rect x="264" width="250" height="39" rx="9" fill="#FCFDFC" stroke="#D5DEDA"/>
    <circle cx="284" cy="19" r="7" fill="#FCFDFC" stroke="#91A09B"/>
    <text x="299" y="24" class="ui" font-size="12" font-weight="650">Contradictory evidence</text>
    <rect x="524" width="292" height="39" rx="9" fill="#DCEBE7" stroke="#AFCFC7"/>
    <circle cx="544" cy="19" r="7" fill="#1C665A"/><path d="M540 19 l3 3 5 -6" fill="none" stroke="#FCFDFC" stroke-width="1.4"/>
    <text x="559" y="24" class="ui" font-size="12" font-weight="650">Exact video moments</text>
  </g>

  <!-- Controls -->
  <text x="282" y="705" class="ui label muted">RESEARCH BOUNDARIES</text>
  <g transform="translate(282 721)">
    <rect width="252" height="72" rx="10" fill="#F7F9F8"/>
    <text x="16" y="23" class="mono" font-size="9">FRESHNESS</text>
    <text x="16" y="49" class="ui" font-size="13" font-weight="700">Last 12 months</text>
    <path d="M219 34 l5 5 5 -5" fill="none" stroke="#697671" stroke-width="1.4"/>
    <rect x="264" width="252" height="72" rx="10" fill="#F7F9F8"/>
    <text x="280" y="23" class="mono" font-size="9">BRIEFING SIZE</text>
    <text x="280" y="49" class="ui" font-size="13" font-weight="700">4 findings · 12 min</text>
    <path d="M483 34 l5 5 5 -5" fill="none" stroke="#697671" stroke-width="1.4"/>
    <rect x="528" width="288" height="72" rx="10" fill="#F7F9F8"/>
    <text x="544" y="23" class="mono" font-size="9">SERENDIPITY</text>
    <text x="544" y="49" class="ui" font-size="13" font-weight="700">15% exploration</text>
    <rect x="680" y="42" width="106" height="4" rx="2" fill="#D5DEDA"/><rect x="680" y="42" width="21" height="4" rx="2" fill="#D79A42"/>
  </g>

  <!-- Footer action -->
  <line x1="282" y1="827" x2="1098" y2="827" class="hair"/>
  <text x="282" y="860" class="ui small muted">Uses TasteDoc v3 · you can inspect the plan before any source is consumed.</text>
  <rect x="816" y="846" width="282" height="48" rx="11" fill="#1C665A"/>
  <text x="957" y="875" text-anchor="middle" class="ui inverse" font-size="13" font-weight="700">Create focus and plan research</text>
  <text x="282" y="925" class="mono" font-size="9">No continuous monitoring · one finite briefing now</text>

  <!-- Right research contract -->
  <g filter="url(#softShadow)"><rect x="1154" y="106" width="414" height="866" rx="15" fill="#FCFDFC"/></g>
  <text x="1188" y="146" class="ui label" fill="#1C665A">RESEARCH CONTRACT</text>
  <text x="1188" y="181" class="ui" font-size="21" font-weight="700">What Cerno will do</text>
  <text x="1188" y="208" class="prose" font-size="14" fill="#596761">A bounded mission the Director must satisfy.</text>

  <!-- contract spine -->
  <line x1="1204" y1="257" x2="1204" y2="604" stroke="#80AA9F" stroke-width="1.5"/>
  <circle cx="1204" cy="263" r="7" fill="#1C665A"/>
  <text x="1229" y="267" class="ui" font-size="13" font-weight="700">Plan the questions</text>
  <text x="1229" y="289" class="ui small muted">Director creates request-specific lanes.</text>

  <circle cx="1204" cy="338" r="7" fill="#FCFDFC" stroke="#1C665A" stroke-width="2"/>
  <text x="1229" y="342" class="ui" font-size="13" font-weight="700">Search live + personal sources</text>
  <text x="1229" y="364" class="ui small muted">LinkUp, archive, and one video lane.</text>

  <circle cx="1204" cy="413" r="7" fill="#FCFDFC" stroke="#1C665A" stroke-width="2"/>
  <text x="1229" y="417" class="ui" font-size="13" font-weight="700">Consume only promising items</text>
  <text x="1229" y="439" class="ui small muted">At most four sources at full depth.</text>

  <circle cx="1204" cy="488" r="7" fill="#FCFDFC" stroke="#1C665A" stroke-width="2"/>
  <text x="1229" y="492" class="ui" font-size="13" font-weight="700">Verify every claim</text>
  <text x="1229" y="514" class="ui small muted">Exact passage or timestamp required.</text>

  <circle cx="1204" cy="563" r="7" fill="#FCFDFC" stroke="#1C665A" stroke-width="2"/>
  <text x="1229" y="567" class="ui" font-size="13" font-weight="700">Publish a finite briefing</text>
  <text x="1229" y="589" class="ui small muted">Four findings, visible rejections, no feed.</text>

  <line x1="1188" y1="634" x2="1534" y2="634" class="hair"/>
  <text x="1188" y="670" class="ui label muted">COMPLETION CRITERIA</text>
  <g transform="translate(1188 688)">
    <rect width="346" height="39" rx="9" fill="#F3F6F5"/>
    <circle cx="18" cy="19" r="6" fill="#DCEBE7"/><path d="M14 19 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.4"/>
    <text x="34" y="23" class="ui small" font-weight="650">At least two independent sources</text>
    <rect y="47" width="346" height="39" rx="9" fill="#F3F6F5"/>
    <circle cx="18" cy="66" r="6" fill="#DCEBE7"/><path d="M14 66 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.4"/>
    <text x="34" y="70" class="ui small" font-weight="650">One novelty comparison per finding</text>
    <rect y="94" width="346" height="39" rx="9" fill="#F3F6F5"/>
    <circle cx="18" cy="113" r="6" fill="#DCEBE7"/><path d="M14 113 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.4"/>
    <text x="34" y="117" class="ui small" font-weight="650">No unsupported citations</text>
    <rect y="141" width="346" height="39" rx="9" fill="#F3F6F5"/>
    <circle cx="18" cy="160" r="6" fill="#FBF5EA"/><path d="M18 154 v8 M18 166 v1" stroke="#B2762F" stroke-width="1.5" stroke-linecap="round"/>
    <text x="34" y="164" class="ui small" font-weight="650">Escalate conflicts instead of guessing</text>
  </g>

  <rect x="1188" y="897" width="346" height="40" rx="10" fill="#F0F7F5" stroke="#BDD7D0"/>
  <circle cx="1208" cy="917" r="5" fill="#1C665A"/>
  <text x="1222" y="921" class="ui" font-size="11" font-weight="700">Estimated run: 1–2 min · under $0.15</text>
</svg>
