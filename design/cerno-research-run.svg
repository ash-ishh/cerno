    <text x="303" y="587" class="ui" font-size="12" font-weight="700">5 claims · 7 evidence chunks</text>
    <text x="303" y="612" class="mono" font-size="9">2 sources · 14.6s · $0.014</text>
    <circle cx="528" cy="560" r="7" fill="#DCEBE7"/><path d="M524 560 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.5"/>

    <rect x="562" y="537" width="273" height="98" rx="11" fill="#F7F9F8" stroke="#D5DEDA"/>
    <text x="583" y="563" class="ui label muted">ARCHIVE CURATOR</text>
    <text x="583" y="587" class="ui" font-size="12" font-weight="700">1 resurfaced · 2 redundant</text>
    <text x="583" y="612" class="mono" font-size="9">8 comparisons · 7.4s · $0.008</text>
    <circle cx="808" cy="560" r="7" fill="#DCEBE7"/><path d="M804 560 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.5"/>

    <rect x="842" y="537" width="272" height="98" rx="11" fill="#F7F9F8" stroke="#D5DEDA"/>
    <text x="863" y="563" class="ui label muted">VIDEO ANALYST · REV 2</text>
    <text x="863" y="587" class="ui" font-size="12" font-weight="700">2 moments · timestamp fixed</text>
    <text x="863" y="612" class="mono" font-size="9">revision +4.1s · $0.006</text>
    <circle cx="1087" cy="560" r="7" fill="#DCEBE7"/><path d="M1083 560 l3 3 5 -6" fill="none" stroke="#1C665A" stroke-width="1.5"/>
  </g>

  <!-- converge -->
  <path d="M424 635 V658 M698 635 V658 M972 635 V658 M424 658 H972 M698 658 V680" fill="none" stroke="#8FB5AC" stroke-width="1.5"/>

  <!-- Personal editor -->
  <g>
    <rect x="406" y="680" width="584" height="86" rx="12" fill="#F0F7F5" stroke="#BDD7D0"/>
    <circle cx="431" cy="705" r="8" fill="#1C665A"/>
    <text x="452" y="708" class="ui label" fill="#1C665A">PERSONAL EDITOR</text>
    <text x="431" y="735" class="ui" font-size="13" font-weight="700">4 selected · 3 redundant · 1 introductory · 1 unavailable</text>
    <text x="955" y="736" text-anchor="end" class="mono" font-size="9">13.2s · $0.013</text>
  </g>

