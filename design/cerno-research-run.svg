  <path d="M698 766 V791 M568 791 H828 M568 791 V814 M828 791 V814" fill="none" stroke="#8FB5AC" stroke-width="1.5"/>
  <path d="M956 814 C1085 814 1090 585 1114 585" fill="none" stroke="#D79A42" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="1047" y="792" class="mono" font-size="9" fill="#B2762F">1 REVISION</text>

