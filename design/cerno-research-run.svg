<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="sheetShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#16231f" flood-opacity="0.07"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#16231f" flood-opacity="0.08"/>
    </filter>
    <style>
      .ui { font-family: "Avenir Next", "Manrope", "Helvetica Neue", sans-serif; fill: #182320; }
      .prose { font-family: "Iowan Old Style", "Literata", Georgia, serif; fill: #182320; }
      .mono { font-family: "SFMono-Regular", "IBM Plex Mono", Menlo, monospace; fill: #52605b; }
      .muted { fill: #697671; }
      .inverse { fill: #FCFDFC; }
      .inverse-muted { fill: #AFC0BA; }
      .hair { stroke: #D5DEDA; stroke-width: 1; }
      .label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }
      .small { font-size: 12px; }
      .body { font-size: 14px; }
      .nav { font-size: 14px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#F3F6F5"/>
  <rect x="0" y="0" width="220" height="1000" fill="#FCFDFC"/>
  <line x1="220" y1="0" x2="220" y2="1000" class="hair"/>

  <!-- Brand -->
  <g transform="translate(30 30)">
    <path d="M0 2 H26 M4 10 H22 M8 18 H18" stroke="#1C665A" stroke-width="2.4" stroke-linecap="round"/>
    <text x="39" y="18" class="ui" font-size="17" font-weight="750" letter-spacing="2.2">CERNO</text>
  </g>
  <text x="31" y="81" class="mono small">PERSONAL INTELLIGENCE</text>

  <!-- Nav -->
  <g class="ui">
    <circle cx="38" cy="142" r="5" fill="#91A09B"/>
    <text x="57" y="147" class="nav muted">Briefings</text>
    <path d="M33 193 h11 M38.5 187.5 v11" stroke="#75827d" stroke-width="1.8" stroke-linecap="round"/>
    <text x="57" y="198" class="nav muted">Focus threads</text>
    <path d="M33 238 h12 v14 h-12 z M36 242 h6 M36 246 h6" fill="none" stroke="#75827d" stroke-width="1.5"/>
    <text x="57" y="249" class="nav muted">TasteDoc</text>
    <rect x="16" y="273" width="188" height="42" rx="9" fill="#DCEBE7"/>
    <path d="M33 289 h13 M33 295 h9 M33 301 h11" stroke="#1C665A" stroke-width="1.6" stroke-linecap="round"/>
    <text x="57" y="300" class="nav">Research runs</text>
    <path d="M33 340 l5 -5 5 5 5 -8" fill="none" stroke="#75827d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="57" y="346" class="nav muted">Evaluations</text>
  </g>

  <!-- Run list -->
  <g transform="translate(17 408)">
    <text x="13" y="0" class="ui label muted">TODAY</text>
    <rect x="0" y="19" width="187" height="76" rx="11" fill="#F3F6F5" stroke="#BDD4CE"/>
    <circle cx="18" cy="43" r="5" fill="#1C665A"/>
    <text x="31" y="46" class="ui" font-size="12" font-weight="700">Run 0142</text>
    <text x="16" y="70" class="ui" font-size="11" fill="#697671">Durable agent memory</text>
    <text x="143" y="70" class="mono" font-size="9">01:18</text>

    <circle cx="18" cy="123" r="5" fill="#D79A42"/>
    <text x="31" y="127" class="ui" font-size="12" font-weight="650">Run 0141</text>
    <text x="16" y="151" class="ui" font-size="11" fill="#697671">Video reasoning</text>
    <text x="143" y="151" class="mono" font-size="9">REVIEW</text>

    <circle cx="18" cy="184" r="5" fill="#1C665A"/>
    <text x="31" y="188" class="ui" font-size="12" font-weight="650">Run 0140</text>
    <text x="16" y="212" class="ui" font-size="11" fill="#697671">Agent distribution</text>
  </g>

  <g transform="translate(17 893)">
    <rect width="187" height="78" rx="12" fill="#182320"/>
    <circle cx="18" cy="23" r="4" fill="#7FC2B3"/>
    <text x="31" y="27" class="ui inverse" font-size="12" font-weight="700">Hermes connected</text>
    <text x="15" y="51" class="mono inverse-muted" font-size="10">profile cerno-director</text>
    <text x="15" y="67" class="mono inverse-muted" font-size="10">gateway healthy · 8642</text>
  </g>

  <!-- Top bar -->
  <text x="254" y="37" class="ui" font-size="12" font-weight="700" fill="#1C665A">RESEARCH OPERATIONS</text>
  <text x="254" y="60" class="ui" font-size="15" font-weight="650">Run 0142 · Long-term memory for production agents</text>
  <rect x="1372" y="22" width="96" height="42" rx="10" fill="#FCFDFC" stroke="#D5DEDA"/>
  <text x="1420" y="48" text-anchor="middle" class="ui" font-size="12" font-weight="700">Compare</text>
  <rect x="1480" y="22" width="88" height="42" rx="10" fill="#182320"/>
  <text x="1524" y="48" text-anchor="middle" class="ui inverse" font-size="12" font-weight="700">Briefing</text>
  <line x1="220" y1="84" x2="1600" y2="84" class="hair"/>

  <!-- Main trace sheet -->
  <g filter="url(#sheetShadow)"><rect x="248" y="106" width="900" height="866" rx="15" fill="#FCFDFC"/></g>
  <text x="282" y="144" class="mono label" fill="#1C665A">RUN 0142  ·  HERMES SESSION RUN_01J8F</text>
  <text x="282" y="181" class="ui" font-size="28" font-weight="700" letter-spacing="-0.6">A complete research desk, one inspectable run</text>
  <text x="282" y="210" class="prose" font-size="15" fill="#65726d">The Director planned six tasks, reviewed every handoff, and published by exception.</text>
  <line x1="282" y1="235" x2="1114" y2="235" class="hair"/>

  <!-- Root plan -->
  <g>
    <rect x="282" y="258" width="832" height="106" rx="12" fill="#F0F7F5" stroke="#BDD7D0"/>
    <circle cx="308" cy="286" r="11" fill="#1C665A"/>
    <path d="M303 286 h10 M308 281 v10" stroke="#FCFDFC" stroke-width="1.5"/>
    <text x="332" y="282" class="ui label" fill="#1C665A">RESEARCH DIRECTOR · PLAN</text>
    <text x="332" y="307" class="ui" font-size="15" font-weight="700">Find new evaluation practices, test novelty, and recover one useful archive item.</text>
    <text x="332" y="331" class="ui small muted">3 research lanes · max 9 candidates · 15% exploration · citation required</text>
    <rect x="934" y="276" width="151" height="29" rx="8" fill="#DCEBE7"/>
    <text x="1009" y="295" text-anchor="middle" class="mono" font-size="10" fill="#1C665A">COMPLETE · 2.8S</text>
    <text x="934" y="334" class="mono" font-size="9">4,211 tok · $0.012</text>
  </g>

  <!-- Tree connectors to scouts -->
  <path d="M698 364 V389 M424 389 H972 M424 389 V408 M698 389 V408 M972 389 V408" fill="none" stroke="#8FB5AC" stroke-width="1.5"/>

  <!-- Scouts -->
  <g>
    <rect x="282" y="408" width="273" height="92" rx="11" fill="#FCFDFC" stroke="#D5DEDA"/>
    <circle cx="303" cy="431" r="6" fill="#1C665A"/>
    <text x="319" y="435" class="ui" font-size="12" font-weight="700">Live web Scout</text>
    <text x="303" y="461" class="ui small muted">LinkUp · 9 candidates</text>
    <text x="303" y="484" class="mono" font-size="9">6.3s · 2,840 tok · $0.006</text>
    <text x="526" y="484" text-anchor="end" class="mono" font-size="9" fill="#1C665A">DONE</text>

    <rect x="562" y="408" width="273" height="92" rx="11" fill="#FCFDFC" stroke="#D5DEDA"/>
    <circle cx="583" cy="431" r="6" fill="#1C665A"/>
    <text x="599" y="435" class="ui" font-size="12" font-weight="700">Archive Scout</text>
    <text x="583" y="461" class="ui small muted">8 related claims · 4 resources</text>
    <text x="583" y="484" class="mono" font-size="9">1.2s · 1,104 tok · $0.002</text>
    <text x="806" y="484" text-anchor="end" class="mono" font-size="9" fill="#1C665A">DONE</text>

    <rect x="842" y="408" width="272" height="92" rx="11" fill="#FCFDFC" stroke="#E1C99F"/>
    <circle cx="863" cy="431" r="6" fill="#D79A42"/>
    <text x="879" y="435" class="ui" font-size="12" font-weight="700">Video Scout</text>
    <text x="863" y="461" class="ui small muted">3 moments · 1 source unavailable</text>
    <text x="863" y="484" class="mono" font-size="9">8.9s · 3,022 tok · $0.007</text>
    <text x="1086" y="484" text-anchor="end" class="mono" font-size="9" fill="#B2762F">EXCEPTION</text>
  </g>

  <!-- connectors to analysts -->
  <path d="M424 500 V537 M698 500 V537 M972 500 V537" fill="none" stroke="#8FB5AC" stroke-width="1.5"/>

  <!-- Analysts -->
