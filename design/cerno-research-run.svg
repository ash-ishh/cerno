    <rect x="406" y="814" width="276" height="82" rx="11" fill="#FCFDFC" stroke="#D5DEDA"/>
    <text x="428" y="839" class="ui label muted">DIRECTOR REVIEW</text>
    <text x="428" y="865" class="ui" font-size="12" font-weight="700">Completion criteria passed</text>
    <text x="428" y="883" class="mono" font-size="9">12/12 citations verified</text>

    <rect x="714" y="814" width="276" height="82" rx="11" fill="#182320"/>
    <text x="736" y="839" class="ui label inverse-muted">PUBLISHER</text>
    <text x="736" y="865" class="ui inverse" font-size="12" font-weight="700">Briefing 0047 published</text>
    <text x="736" y="883" class="mono inverse-muted" font-size="9">public surface · 0.4s</text>
  </g>
  <circle cx="698" cy="936" r="7" fill="#1C665A"/>
  <text x="715" y="940" class="mono" font-size="9" fill="#1C665A">RUN COMPLETE · 01:18.4</text>

