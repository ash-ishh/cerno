  <g filter="url(#softShadow)"><rect x="1170" y="106" width="398" height="866" rx="15" fill="#FCFDFC"/></g>
  <g>
    <text x="1202" y="146" class="ui label" fill="#1C665A">RUN PROOF</text>
    <text x="1202" y="181" class="ui" font-size="21" font-weight="700">Completed by exception</text>
    <rect x="1202" y="202" width="334" height="74" rx="11" fill="#182320"/>
    <circle cx="1225" cy="225" r="6" fill="#7FC2B3"/>
    <text x="1242" y="229" class="ui inverse" font-size="12" font-weight="700">Published successfully</text>
    <text x="1220" y="254" class="mono inverse-muted" font-size="10">No judge or operator intervention</text>

