      <text x="0" y="0" class="mono" font-size="9">LATENCY</text><text x="167" y="0" class="mono" font-size="9">MODEL COST</text>
      <text x="0" y="27" class="ui" font-size="22" font-weight="700">01:18</text><text x="167" y="27" class="ui" font-size="22" font-weight="700">$0.084</text>
      <line x1="0" y1="47" x2="334" y2="47" class="hair"/>
      <text x="0" y="73" class="mono" font-size="9">AGENT STEPS</text><text x="167" y="73" class="mono" font-size="9">TOKENS</text>
      <text x="0" y="100" class="ui" font-size="22" font-weight="700">8</text><text x="167" y="100" class="ui" font-size="22" font-weight="700">32.4k</text>
    </g>

    <line x1="1202" y1="433" x2="1536" y2="433" class="hair"/>
    <text x="1202" y="468" class="ui label" fill="#B2762F">EXCEPTION HANDLED</text>
    <rect x="1202" y="484" width="334" height="103" rx="11" fill="#FBF5EA" stroke="#E6D1AB"/>
    <circle cx="1223" cy="507" r="6" fill="#D79A42"/>
    <text x="1240" y="511" class="ui" font-size="12" font-weight="700">One video source unavailable</text>
    <text x="1220" y="536" class="ui small muted">Director continued with two independent sources</text>
    <text x="1220" y="556" class="ui small muted">and recorded the missing coverage in the briefing.</text>
    <text x="1220" y="575" class="mono" font-size="9" fill="#B2762F">POLICY: PROCEED IF 2+ SOURCES REMAIN</text>

    <line x1="1202" y1="617" x2="1536" y2="617" class="hair"/>
    <text x="1202" y="652" class="ui label muted">CONTEXT CARRIED THROUGH</text>
    <g transform="translate(1202 672)">
      <rect width="334" height="35" rx="9" fill="#F3F6F5"/>
      <circle cx="18" cy="17" r="5" fill="#1C665A"/>
      <text x="33" y="21" class="ui small" font-weight="650">Focus Thread 07</text>
      <text x="316" y="21" text-anchor="end" class="mono" font-size="9">CURRENT MISSION</text>
      <rect y="43" width="334" height="35" rx="9" fill="#F3F6F5"/>
      <circle cx="18" cy="60" r="5" fill="#1C665A"/>
      <text x="33" y="64" class="ui small" font-weight="650">TasteDoc v3</text>
      <text x="316" y="64" text-anchor="end" class="mono" font-size="9">QUALITY RULES</text>
      <rect y="86" width="334" height="35" rx="9" fill="#F3F6F5"/>
      <circle cx="18" cy="103" r="5" fill="#1C665A"/>
      <text x="33" y="107" class="ui small" font-weight="650">8 prior claims</text>
      <text x="316" y="107" text-anchor="end" class="mono" font-size="9">USER HISTORY</text>
      <rect y="129" width="334" height="35" rx="9" fill="#F3F6F5"/>
      <circle cx="18" cy="146" r="5" fill="#D79A42"/>
      <text x="33" y="150" class="ui small" font-weight="650">4 editorial policies</text>
      <text x="316" y="150" text-anchor="end" class="mono" font-size="9">GUARDRAILS</text>
    </g>

    <rect x="1202" y="871" width="334" height="40" rx="10" fill="#1C665A"/>
    <text x="1369" y="896" text-anchor="middle" class="ui inverse" font-size="13" font-weight="700">Open published briefing</text>
    <rect x="1202" y="921" width="334" height="31" rx="9" fill="#FCFDFC" stroke="#9EBAB3"/>
    <text x="1369" y="941" text-anchor="middle" class="ui" font-size="11" font-weight="700" fill="#1C665A">Inspect raw inputs and outputs</text>
  </g>
</svg>
