model:
  provider: azure-foundry
  base_url: https://__AZURE_AI_ACCOUNT__.openai.azure.com/openai/v1
  api_mode: chat_completions
  auth_mode: entra_id
  default: gpt-5.4-mini
  context_length: 400000

agent:
  max_iterations: 30
  disabled_toolsets:
    - web
    - search
    - terminal
    - file
    - browser
    - code_execution
    - memory
    - session_search
    - cronjob
    - messaging
    - skills
    - skills_hub
    - vision
    - video
    - image_gen
    - video_gen
    - x_search
    - tts
    - clarify
    - context_engine
    - homeassistant
    - spotify
    - discord
    - discord_admin
    - yuanbao
    - computer_use

# The public API receives only planning and native delegation. Cerno-specific
# deterministic tools will be added by the project plugin before product use.
platform_toolsets:
  api_server:
    - delegation
    - todo

# Keep the first implementation flat and bounded: Director -> leaf specialists.
delegation:
  max_iterations: 12
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: false
  child_timeout_seconds: 900
  inherit_mcp_toolsets: false

gateway:
  api_server:
    max_concurrent_runs: 4

tool_loop_guardrails:
  hard_stop_enabled: true
  hard_stop_after:
    exact_failure: 5
    idempotent_no_progress: 5

memory:
  provider: builtin
